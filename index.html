<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymTrackerPro</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111;
      color: #fff;
    }
    .container {
      padding: 20px;
    }
    button {
      padding: 12px 16px;
      border: none;
      background: #00c896;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .card {
      background: #1e1e1e;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    .hidden { display: none; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

// ---------- STATE ----------
let user = localStorage.getItem("user");
let workouts = JSON.parse(localStorage.getItem("workouts") || "[]");

// ---------- ROUTER ----------
function render() {
  if (!user) return renderLanding();
  renderDashboard();
}

// ---------- LANDING ----------
function renderLanding() {
  app.innerHTML = `
    <h1>💪 GymTrackerPro</h1>
    <p>Track your workouts. Improve every day.</p>

    <button onclick="login()">Get Started</button>

    <div class="card">
      <h3>📊 Track progress</h3>
      <p>See your improvement over time</p>
    </div>

    <div class="card">
      <h3>🏋️ Log workouts</h3>
      <p>Fast and simple tracking</p>
    </div>
  `;
}

function login() {
  localStorage.setItem("user", "demo");
  user = "demo";
  render();
}

// ---------- DASHBOARD ----------
function renderDashboard() {
  const total = workouts.length;

  app.innerHTML = `
    <h2>Your Progress</h2>
    <button onclick="logout()">Logout</button>

    <div class="card">
      <h3>Total Workouts: ${total}</h3>
    </div>

    <div class="card">
      <h3>Recent Workouts</h3>
      ${workouts.slice(-5).reverse().map(w => `
        <div>
          <strong>${w.name}</strong><br/>
          <small>${w.date}</small>
        </div>
      `).join("")}
    </div>

    <button onclick="showAdd()">➕ Add Workout</button>

    <div id="addForm" class="hidden">
      <input id="wName" placeholder="Workout name"/>
      <button onclick="addWorkout()">Save Workout</button>
    </div>
  `;
}

function logout() {
  localStorage.removeItem("user");
  user = null;
  render();
}

// ---------- ADD WORKOUT ----------
function showAdd() {
  document.getElementById("addForm").classList.toggle("hidden");
}

function addWorkout() {
  const name = document.getElementById("wName").value;

  const workout = {
    name,
    date: new Date().toLocaleDateString()
  };

  workouts.push(workout);
  localStorage.setItem("workouts", JSON.stringify(workouts));

  render();
}

// ---------- INIT ----------
render();

// ---------- SERVICE WORKER ----------
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
