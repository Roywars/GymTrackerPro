<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
button {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}
input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let user = localStorage.getItem("user");
let workouts = JSON.parse(localStorage.getItem("workouts") || "[]");

function render() {
  if (!user) {
    document.getElementById("app").innerHTML = `
      <h1>💪 GymTracker</h1>
      <button onclick="login()">Start training</button>
    `;
  } else {
    dashboard();
  }
}

function login() {
  localStorage.setItem("user", "1");
  user = "1";
  render();
}

function dashboard() {
  document.getElementById("app").innerHTML = `
    <h2>Your progress</h2>

    <div class="card">
      Total workouts: ${workouts.length}
    </div>

    <div class="card">
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <input id="name" placeholder="Workout name">
      <button onclick="addWorkout()">Add workout</button>
    </div>
  `;

  renderChart();
}

function addWorkout() {
  const name = document.getElementById("name").value;

  if (!name) return alert("Write a name");

  workouts.push({
    name,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("workouts", JSON.stringify(workouts));
  render();
}

function renderChart() {
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let data = [0,0,0,0,0,0,0];

  workouts.forEach(w => {
    const d = new Date(w.date).getDay();
    data[d]++;
  });

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: days,
      datasets: [{ data }]
    }
  });
}

render();
</script>

</body>
</html>
